const RULES = ["REQ-001: Zero non-determinism (No Math.random).", "REQ-002: MOVE fails if target is out of [0, gridSize-1] or occupied by any living unit.", "REQ-003: ATTACK targets the living enemy with min ID at Manhattan distance 1.", "REQ-004: Enemy AI targets living ally with min Manhattan distance, tie-break by min ally ID.", "REQ-005: Enemy MOVE priority: X-axis reduction > Y-axis reduction > smaller resulting x > smaller resulting y.", "REQ-006: Turn counter increments after every ally action attempt, regardless of success.", "REQ-007: Enemy AI executes in ascending order of enemy IDs after every ally action.", "REQ-008: Immediate termination on VICTORY (all enemies dead) or DEFEAT (all allies dead).", "REQ-009: Final output is a JSON object containing sorted lists of living units.", "Output roster is full: allies and enemies arrays ALWAYS contain every unit from the initial state in ascending id, including units whose hp has dropped to 0 or below. Never remove a dead unit from the output.", "REQ-011: Ally units may have an optional 'range' attribute (integer). If present, the 'attack' action targets the living enemy with the min ID among those with Manhattan distance d such that 1 <= d <= range. If 'range' is absent or <= 0, the attack distance defaults to 1.", "REQ-012: If an ally unit has `knockback: true`, any successful 'attack' pushes the target unit 1 cell away in the opposite direction of the attacker (target_pos + (target_pos - attacker_pos)). The push occurs only if the destination is within grid bounds and not occupied by any living unit; otherwise, the target remains in place. Damage is applied regardless of whether the push succeeds.", "REQ-013: If an ally unit has a 'flank_bonus' attribute (integer), any successful 'attack' deals additional damage: total_damage = atk + (flank_bonus * count), where 'count' is the number of other living ally units at Manhattan distance 1 from the target unit at the moment of attack.", "REQ-014: If a unit has a 'reflect_dmg' attribute (integer), any successful 'attack' (where the target is living at the start of the attack) causes the attacker to immediately take damage equal to the target's 'reflect_dmg' value. This occurs after the initial attack damage is applied, regardless of whether the target survives the attack.", "REQ-015: If a unit has an `unmovable: true` attribute, any knockback effect (as defined in REQ-012) that would change its position is ignored; the unit remains in its current cell, while damage is still applied.", "REQ-016: If a unit has an 'aura_shield' attribute (integer), any other living unit of the same side at Manhattan distance 1 from that unit has all incoming damage reduced by the 'aura_shield' value. If multiple units provide such a shield to the target, their 'aura_shield' values are summed. Damage cannot be reduced below 0.", "REQ-017: If a unit has a 'phalanx_defense' attribute (integer), any successful 'attack' targeting that unit reduces the incoming damage by the 'phalanx_defense' value if there is at least one other living unit of the same side at Manhattan distance 1 from the target. This reduction is applied after 'aura_shield' reductions. Damage cannot be reduced below 0.", "REQ-018: If a unit has an 'asymmetric_strike' attribute (integer), any successful 'attack' where the attacker's x-coordinate is strictly less than the target's x-coordinate deals additional damage equal to the 'asymmetric_strike' value. This bonus is added to the base attack damage before any aura_shield or phalanx_defense reductions."];

function clone(s){ return JSON.parse(JSON.stringify(s)); }
function freshState(w){ const s = clone(w.initialState); s.turn = 0;
  s.allies = s.allies.map(u=>({...u})); s.enemies = s.enemies.map(u=>({...u})); return s; }
// k 액션 적용 후 상태 + status (검증 엔진 그대로: updateState가 state 변경 + status 반환)
function stateAt(w, k){
  const s = freshState(w); let status='PLAYING';
  for(let i=0;i<k;i++){
    const r = GAME_LOGIC.updateState(s, w.actions[i]);
    if(r==='VICTORY'||r==='DEFEAT'){ status=r; return {s, status, ended:i+1}; }
  }
  if(k>=w.actions.length) status='FINISHED';
  return {s, status, ended:null};
}

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let wi=0, step=0, timer=null;

function gridSize(w){ return w.initialState.gridSize; }
function draw(w){
  const N=gridSize(w), S=cv.width, c=S/N;
  ctx.clearRect(0,0,S,S);
  ctx.strokeStyle='#222838';
  for(let i=0;i<=N;i++){ ctx.beginPath(); ctx.moveTo(i*c,0); ctx.lineTo(i*c,S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*c); ctx.lineTo(S,i*c); ctx.stroke(); }
  const {s,status}=stateAt(w, step);
  const unit=(u,color,dead)=>{ const [x,y]=u.pos; const cx=x*c+c/2, cy=y*c+c/2;
    ctx.globalAlpha = dead?0.28:1; ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(cx,cy,c*0.33,0,7); ctx.fill();
    ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font=`bold ${Math.floor(c*0.26)}px system-ui`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((dead?'✕':u.id), cx, cy-c*0.04);
    ctx.font=`${Math.floor(c*0.2)}px system-ui`; ctx.fillStyle = dead?'#888':'#dfe';
    ctx.fillText('hp'+u.hp, cx, cy+c*0.26); };
  for(const e of s.enemies) unit(e,'#ff5b6e', e.hp<=0);
  for(const a of s.allies) unit(a,'#5b8cff', a.hp<=0);
  document.getElementById('turn').textContent=s.turn;
  const st=document.getElementById('st');
  const cls={VICTORY:'v',DEFEAT:'d',FINISHED:'f',PLAYING:'p'}[status];
  st.className='status '+cls; st.textContent=status;
  document.getElementById('prev').disabled = step<=0;
  document.getElementById('next').disabled = (status==='VICTORY'||status==='DEFEAT'||step>=w.actions.length);
}
function render(){ draw(WORLDS[wi]); }
function setScn(i){ wi=i; step=0; stopPlay();
  const w=WORLDS[i];
  document.getElementById('desc').textContent =
    `${w.id} · 아군 ${w.initialState.allies.length} · 적 ${w.initialState.enemies.length} · ${(w.covers_reqs||[]).join(', ')}`;
  render(); }
function next(){ const w=WORLDS[wi]; const {status}=stateAt(w,step);
  if(status==='VICTORY'||status==='DEFEAT'||step>=w.actions.length){ stopPlay(); return; }
  step++; render(); }
function prev(){ if(step>0){ step--; render(); } }
function stopPlay(){ if(timer){ clearInterval(timer); timer=null; document.getElementById('play').textContent='▶▶ 재생'; } }
function play(){ if(timer){ stopPlay(); return; }
  document.getElementById('play').textContent='⏸ 정지';
  timer=setInterval(()=>{ const w=WORLDS[wi]; const {status}=stateAt(w,step);
    if(status==='VICTORY'||status==='DEFEAT'||step>=w.actions.length){ stopPlay(); } else { step++; render(); } }, 650); }

const sel=document.getElementById('scn');
WORLDS.forEach((w,i)=>{ const o=document.createElement('option'); o.value=i;
  o.textContent=`${w.id} (아군${w.initialState.allies.length}·적${w.initialState.enemies.length})`; sel.appendChild(o); });
sel.onchange=e=>setScn(+e.target.value);
document.getElementById('reset').onclick=()=>{ step=0; stopPlay(); render(); };
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.getElementById('play').onclick=play;
document.getElementById('cards').innerHTML='<b>누적 규칙</b><br>'+RULES.map(r=>'· '+r).join('<br>');
setScn(0);
</script></body></html>
