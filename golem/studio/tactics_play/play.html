<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>전술 SRPG — 플레이 (l9)</title>
<style>
  :root{--bg:#0f1220;--panel:#1a1f33;--grid:#2a3150;--cell:#161b2e;--hero:#4ea1ff;--enemy:#ff5d6c;--wall:#3a3f52;--cond:#21d3c8;--txt:#e6e9f5;--dim:#8b93b5;--ok:#43d17a;--bad:#ff6b7a;--rng:#ffd866}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 system-ui,'Segoe UI',sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:14px}h1{font-size:17px;margin:0 0 2px}.sub{color:var(--dim);font-size:12px;margin-bottom:10px}
  select,button{background:var(--panel);color:var(--txt);border:1px solid var(--grid);border-radius:8px;padding:7px 11px;font:inherit;cursor:pointer}
  button:hover{border-color:var(--hero)}button:disabled{opacity:.4;cursor:default}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .stage{display:flex;gap:14px;flex-wrap:wrap}canvas{background:var(--panel);border-radius:12px;touch-action:manipulation}
  .side{flex:1;min-width:230px}.stat{background:var(--panel);border-radius:10px;padding:9px 11px;margin-bottom:7px}.stat b{color:var(--hero)}
  .status{font-size:16px;font-weight:700}.status.VICTORY{color:var(--ok)}.status.DEFEAT{color:var(--bad)}
  .pad{display:grid;grid-template-columns:repeat(3,40px);grid-gap:5px;justify-content:center;margin:6px 0}
  .pad button{height:40px;padding:0;font-size:16px}.pad .sp{visibility:hidden}
  .bars{height:7px;background:var(--cell);border-radius:4px;overflow:hidden;margin-top:3px}.bars>i{display:block;height:100%}
  .log{font-size:12px;color:var(--dim);margin-top:6px;min-height:32px}.hint{font-size:11px;color:var(--dim);margin-top:6px}
  .ebox div{font-size:12px}.dead{opacity:.4;text-decoration:line-through}
  .banner{font-size:15px;font-weight:700;padding:6px 0}
  .storybox{background:var(--panel);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;line-height:1.55;white-space:pre-wrap}
  .storybox .t{color:var(--hero);font-weight:700;margin-bottom:3px}.storybox .clr{color:var(--ok);margin-top:7px}.storybox:empty{display:none}
  .scene{position:fixed;inset:0;z-index:-1;overflow:hidden}.scene svg{width:100%;height:100%;display:block}
  h1,.sub{text-shadow:0 1px 3px rgba(0,0,0,.85)}
</style></head><body><div class="scene"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="air" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0c16"/><stop offset="0.45" stop-color="#141832"/><stop offset="1" stop-color="#080a12"/></linearGradient>
  <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#262c47"/><stop offset="1" stop-color="#171b30"/></linearGradient>
  <radialGradient id="torch" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#ffb15a" stop-opacity="0.55"/><stop offset="0.5" stop-color="#ff8a3c" stop-opacity="0.18"/><stop offset="1" stop-color="#ff8a3c" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx="0.5" cy="0.42" r="0.75">
    <stop offset="0" stop-color="#000000" stop-opacity="0"/><stop offset="0.7" stop-color="#000000" stop-opacity="0.18"/><stop offset="1" stop-color="#000000" stop-opacity="0.72"/></radialGradient>

      <line x1="0" y1="45" x2="160" y2="45"/><line x1="0" y1="90" x2="160" y2="90"/>
      <line x1="80" y1="0" x2="80" y2="45"/><line x1="0" y1="45" x2="0" y2="90"/><line x1="160" y1="45" x2="160" y2="90"/></g>
    <g stroke="#313858" stroke-width="1" opacity="0.5"><line x1="0" y1="47" x2="160" y2="47"/><line x1="82" y1="2" x2="82" y2="43"/></g>
  </pattern>
</defs>
<rect width="1000" height="1400" fill="url(#air)"/>
<rect width="1000" height="1400" fill="url(#brick)" opacity="0.85"/>
<path d="M340 1400 V520 Q500 300 660 520 V1400 Z" fill="#06080f"/>
<path d="M360 1400 V528 Q500 332 640 528 V1400 Z" fill="none" stroke="#414a72" stroke-width="6" opacity="0.7"/>
<rect x="150" y="300" width="70" height="1100" fill="url(#stone)" stroke="#0d1020" stroke-width="4"/>
<rect x="780" y="300" width="70" height="1100" fill="url(#stone)" stroke="#0d1020" stroke-width="4"/>

<g>
  <rect x="232" y="560" width="16" height="70" fill="#3a2a1c"/><ellipse cx="240" cy="548" rx="22" ry="34" fill="#ffd36a"/><ellipse cx="240" cy="556" rx="12" ry="20" fill="#fff3c4"/>
  <circle cx="240" cy="560" r="220" fill="url(#torch)"/>
  <rect x="752" y="560" width="16" height="70" fill="#3a2a1c"/><ellipse cx="760" cy="548" rx="22" ry="34" fill="#ffd36a"/><ellipse cx="760" cy="556" rx="12" ry="20" fill="#fff3c4"/>
  <circle cx="760" cy="560" r="220" fill="url(#torch)"/>

<rect width="1000" height="1400" fill="url(#vig)"/>
</svg></div><div class="wrap">
<h1>전술 SRPG — 직접 플레이</h1>
<div class="sub">골렘이 골든0으로 검증한 l9 엔진을 그대로 구동(룰 복제 없음). 이동=방향 버튼, 공격=적 클릭(거리1 근접·거리2~3 사거리 자동).</div>
<div class="bar"><select id="pick"></select><button id="undo">↩ 무르기</button><button id="reset">⟲ 리셋</button><span id="ld" class="sub" style="margin:0"></span></div>
<div id="story" class="storybox"></div>
<div class="stage">
  <canvas id="cv" width="420" height="420"></canvas>
  <div class="side">
    <div class="stat"><span id="status" class="status">ACTIVE</span> <span id="battle" class="sub"></span> <span id="banner" class="banner"></span></div>
    <div class="stat">턴 <b id="turn">0</b> · HP <b id="hp"></b> · 마나 <b id="mana"></b> · ATK <b id="atk"></b>
      <div class="bars"><i id="hpbar" style="background:var(--hero)"></i></div></div>
    <div class="pad">
      <button class="sp"></button><button data-dx="0" data-dy="-1">↑</button><button class="sp"></button>
      <button data-dx="-1" data-dy="0">←</button><button class="sp"></button><button data-dx="1" data-dy="0">→</button>
      <button class="sp"></button><button data-dx="0" data-dy="1">↓</button><button class="sp"></button></div>
    <div class="stat ebox" id="ebox"></div>
    <div class="log" id="log"></div>
    <div class="hint">적 위 노란 테두리=클릭하면 공격(거리1 근접/거리2~3 사거리). 벽은 이동만 막음.</div>
  </div></div></div>
<script>
const LEVELS=[{"name": "1. 기초 전투", "desc": "이동과 기본 공격으로 적을 처치하세요.", "teaches": "move, attack", "initialState": {"hero": {"hp": 10, "atk": 4, "pos": [0, 0]}, "enemies": [{"id": 1, "hp": 10, "atk": 2, "pos": [2, 0]}]}, "_signals": {"min_turns": 3, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": [], "min_turns_no_card": null}}, {"name": "2. 강화 장갑과 처형", "desc": "강화된 적은 피해를 덜 입습니다. 처형 능력으로 마무리하세요.", "teaches": "Hardened, execute", "initialState": {"hero": {"hp": 20, "atk": 5, "pos": [0, 0], "execute": 3}, "enemies": [{"id": 1, "hp": 13, "atk": 3, "pos": [1, 0], "unit_type": "Hardened"}]}, "_signals": {"min_turns": 3, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": ["execute"], "min_turns_no_card": 4}}, {"name": "3. 거리 유지", "desc": "원거리 공격의 사거리를 활용하십시오.", "teaches": "ranged_attack", "initialState": {"hero": {"hp": 10, "atk": 3, "pos": [0, 0]}, "enemies": [{"id": 1, "hp": 9, "atk": 5, "pos": [0, 3]}]}, "_signals": {"min_turns": 3, "greedy_melee": "DEFEAT", "greedy_ranged": "VICTORY", "card_fields": [], "min_turns_no_card": null}}, {"name": "4. 거리 조절", "desc": "근접 공격은 위험합니다. 원거리 공격의 사거리를 활용하세요.", "teaches": "ranged_attack", "initialState": {"hero": {"hp": 10, "atk": 3, "pos": [0, 0]}, "enemies": [{"id": 1, "hp": 5, "atk": 5, "pos": [2, 0]}, {"id": 2, "hp": 5, "atk": 5, "pos": [0, 2]}]}, "_signals": {"min_turns": 4, "greedy_melee": "DEFEAT", "greedy_ranged": "VICTORY", "card_fields": [], "min_turns_no_card": null}}, {"name": "5. 마나 보호막과 파열", "desc": "마나가 0이 되는 순간 발생하는 '이상 파열' 피해를 이용하세요.", "teaches": "mana, anomaly_dmg (Rupture)", "initialState": {"hero": {"hp": 21, "atk": 2, "pos": [0, 0], "mana": 5, "anomaly_dmg": 10}, "enemies": [{"id": 1, "hp": 15, "atk": 10, "pos": [1, 0]}]}, "_signals": {"min_turns": 4, "greedy_melee": "DEFEAT", "greedy_ranged": "DEFEAT", "card_fields": ["mana", "anomaly_dmg"], "min_turns_no_card": 9}}, {"name": "6. 보호막의 기초", "desc": "마나 쉴드가 적의 공격을 흡수하여 생존하는 법을 배웁니다.", "teaches": "Mana Shield", "initialState": {"hero": {"hp": 10, "atk": 5, "pos": [0, 0], "mana": 10}, "enemies": [{"id": 1, "hp": 20, "atk": 2, "pos": [0, 1]}]}, "_signals": {"min_turns": 4, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": ["mana"], "min_turns_no_card": 4}}, {"name": "7. 강철의 벽", "desc": "마나 쉴드로 적의 반격을 흡수하며 단단한 적을 깎아내십시오.", "teaches": "mana shield, hardened", "initialState": {"hero": {"hp": 10, "atk": 3, "pos": [0, 0], "mana": 10}, "enemies": [{"id": 1, "hp": 12, "atk": 3, "pos": [1, 0], "unit_type": "Hardened"}]}, "_signals": {"min_turns": 5, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": ["mana"], "min_turns_no_card": 5}}, {"name": "8. 전도성 지형", "desc": "전도성 타일 위에서 파열을 일으켜 광역 피해를 극대화하세요.", "teaches": "Conductive terrain", "initialState": {"hero": {"hp": 20, "atk": 2, "pos": [0, 0], "mana": 5, "anomaly_dmg": 5}, "enemies": [{"id": 1, "hp": 15, "atk": 2, "pos": [1, 0]}, {"id": 2, "hp": 15, "atk": 2, "pos": [0, 1]}], "terrain": {"0,0": "Conductive"}}, "_signals": {"min_turns": 6, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": ["mana", "anomaly_dmg"], "min_turns_no_card": null}}, {"name": "9. 전술적 종합", "desc": "모든 메커니즘을 조합하여 생존하고 적을 섬멸하세요.", "teaches": "Hardened, Conductive, Lifesteal, Rupture", "initialState": {"hero": {"hp": 40, "atk": 8, "pos": [0, 0], "mana": 10, "anomaly_dmg": 5, "lifesteal": 0.5}, "enemies": [{"id": 1, "hp": 25, "atk": 10, "pos": [1, 0], "unit_type": "Hardened"}, {"id": 2, "hp": 25, "atk": 10, "pos": [0, 1], "unit_type": "Hardened"}], "terrain": {"0,0": "Conductive"}}, "_signals": {"min_turns": 6, "greedy_melee": "VICTORY", "greedy_ranged": "VICTORY", "card_fields": ["mana", "anomaly_dmg"], "min_turns_no_card": 9}}, {"name": "10. 생명력의 순환", "desc": "피해를 입히며 동시에 회복하는 라이프스틸을 활용하십시오.", "teaches": "Lifesteal", "initialState": {"hero": {"hp": 10, "atk": 4, "pos": [0, 0], "lifesteal": 0.5}, "enemies": [{"id": 1, "hp": 24, "atk": 2, "pos": [0, 1]}]}, "_signals": {"min_turns": 6, "greedy_melee": "VICTORY", "greedy_ra
